<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Semakan Email DELIMA SMK Sungai Besar</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  margin:0;
  padding:30px 20px;
  background:linear-gradient(135deg,#f8fbff,#eef4ff);
  color:#1e293b;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:40px 30px;
  border-radius:24px;
  box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.header{
  text-align:center;
  margin-bottom:30px;
}

.school-logo{
  width:120px;
  height:auto;
  margin-bottom:15px;
}

.header h1{
  margin:0;
  font-size:32px;
  color:#0f172a;
}

.header p{
  margin:8px 0;
  font-size:18px;
  color:#475569;
}

.subtitle{
  font-size:14px;
  color:#64748b;
}

.search-box{
  display:flex;
  gap:12px;
  margin-top:25px;
  flex-wrap:wrap;
}

input{
  flex:1;
  min-width:250px;
  padding:15px;
  font-size:16px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  background:#f8fafc;
}

input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

button{
  padding:15px 24px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:.25s;
}

button:hover:not(:disabled){
  background:#1d4ed8;
  transform:translateY(-1px);
}

button:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

#result{
  margin-top:25px;
  padding:25px;
  border-radius:18px;
  background:#f8fbff;
  border:1px dashed #cbd5e1;
  min-height:100px;
}

.result-card{
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.04);
}

.result-name{
  font-size:20px;
  font-weight:bold;
  color:#0f172a;
  margin-bottom:8px;
}

.result-email{
  color:#2563eb;
  font-size:17px;
}

.match{
  padding:14px 0;
  border-bottom:1px solid #e5e7eb;
}

.match:last-child{
  border-bottom:none;
}

.status{
  text-align:center;
  margin-top:15px;
  color:#64748b;
  font-size:15px;
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#94a3b8;
  font-size:13px;
}

@media(max-width:600px){
  .search-box{
    flex-direction:column;
  }

  button{
    width:100%;
  }

  .school-logo{
    width:100px;
  }

  .header h1{
    font-size:26px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="LOGO SMK 2025.png" class="school-logo">
    <h1>Portal Semakan Email DELIMA</h1>
    <p>SMK Sungai Besar</p>
    <div class="subtitle">Semakan email rasmi murid bagi akses DELIMA KPM</div>
  </div>

  <div class="search-box">
    <input id="name" placeholder="Taip nama murid">
    <button id="searchBtn" onclick="searchEmail()" disabled>Semak</button>
  </div>

  <div id="result">Memuatkan data...</div>
  <div class="status" id="statusText">Sila tunggu. Data sedang dimuatkan.</div>

  <div class="footer">
    Portal semakan rasmi murid SMK Sungai Besar
  </div>

</div>

<script>
let studentData = [];

fetch('./data.json')
.then(response => {
  if (!response.ok) throw new Error('Fail data.json tidak dijumpai');
  return response.json();
})
.then(data => {
  studentData = data;
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="result-name">Data berjaya dimuatkan</div>
      <div class="result-email">Boleh mula semakan nama murid.</div>
    </div>
  `;
  document.getElementById('statusText').innerHTML = 'Jumlah rekod: ' + studentData.length;
})
.catch(error => {
  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="result-name">Ralat memuatkan data</div>
      <div class="result-email">${error.message}</div>
    </div>
  `;
});

function normalizeText(text){
  return text.toLowerCase().replace(/\s+/g,' ').trim();
}

function searchEmail(){
  const input = normalizeText(document.getElementById('name').value);
  const result = document.getElementById('result');

  if(!input){
    result.innerHTML = `
      <div class="result-card">
        <div class="result-name">Sila masukkan nama murid</div>
      </div>
    `;
    return;
  }

  const found = studentData.find(s => normalizeText(s.name) === input);

  if(found){
    result.innerHTML = `
      <div class="result-card">
        <div class="result-name">${found.name}</div>
        <div class="result-email">${found.email}</div>
      </div>
    `;
  } else {
    const partial = studentData.filter(s =>
      normalizeText(s.name).includes(input)
    ).slice(0,10);

    if(partial.length > 0){
      result.innerHTML = partial.map(s =>
        `<div class="match">
          <div class="result-name">${s.name}</div>
          <div class="result-email">${s.email}</div>
        </div>`
      ).join('');
    } else {
      result.innerHTML = `
        <div class="result-card">
          <div class="result-name">Nama tidak dijumpai</div>
        </div>
      `;
    }
  }
}

document.getElementById('name').addEventListener('keydown', function(event){
  if(event.key === 'Enter'){
    searchEmail();
  }
});
</script>

</body>
</html>
