<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Semakan Email DELIMA SMK Sungai Besar</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:30px 20px;
  background:linear-gradient(135deg,#f8fbff,#eef4ff);
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:40px 30px;
  border-radius:24px;
  box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.header{text-align:center;margin-bottom:30px;}

.school-logo{
  width:120px;
  margin-bottom:15px;
}

.header h1{
  margin:0;
  font-size:32px;
}

.header p{
  margin:8px 0;
  color:#475569;
}

.subtitle{
  font-size:14px;
  color:#64748b;
}

.search-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:25px;
}

input{
  flex:1;
  min-width:250px;
  padding:15px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  font-size:16px;
}

button{
  padding:15px 20px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#searchBtn{
  background:#2563eb;
}

#resetBtn{
  background:#64748b;
}

.copy-btn{
  margin-top:12px;
  background:#16a34a;
  padding:12px 18px;
}

#result{
  margin-top:25px;
  padding:25px;
  border-radius:18px;
  background:#f8fbff;
  border:1px dashed #cbd5e1;
}

.result-card{
  background:white;
  padding:18px;
  border-radius:14px;
}

.result-name{
  font-size:20px;
  font-weight:bold;
}

.result-email{
  color:#2563eb;
  margin-top:8px;
}

.match{
  padding:14px 0;
  border-bottom:1px solid #e5e7eb;
}

.status{
  text-align:center;
  margin-top:15px;
  color:#64748b;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#94a3b8;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="LOGO SMK 2025.png" class="school-logo">
<h1>Portal Semakan Email DELIMA</h1>
<p>SMK Sungai Besar</p>
<div class="subtitle">Semakan email rasmi murid bagi akses DELIMA KPM</div>
</div>

<div class="search-box">
<input id="name" placeholder="Taip nama murid">
<button id="searchBtn" onclick="searchEmail()" disabled>Semak</button>
<button id="resetBtn" onclick="resetSearch()">Reset</button>
</div>

<div id="result">Memuatkan data...</div>
<div class="status" id="statusText">Sila tunggu. Data sedang dimuatkan.</div>

<div class="footer">
Portal semakan rasmi murid SMK Sungai Besar
</div>

</div>

<script>
let studentData=[];

fetch('./data.json')
.then(response=>response.json())
.then(data=>{
  studentData=data;
  document.getElementById('searchBtn').disabled=false;
  document.getElementById('result').innerHTML=`
    <div class="result-card">
      <div class="result-name">Data berjaya dimuatkan</div>
      <div class="result-email">Boleh mula semakan nama murid.</div>
    </div>
  `;
  document.getElementById('statusText').innerHTML='Jumlah rekod: '+studentData.length;
});

function normalizeText(text){
  return text.toLowerCase().replace(/\s+/g,' ').trim();
}

function copyEmail(email){
  navigator.clipboard.writeText(email);
}

function resetSearch(){
  document.getElementById('name').value='';
  document.getElementById('result').innerHTML=`
    <div class="result-card">
      <div class="result-name">Sila buat carian baharu</div>
    </div>
  `;
}

function searchEmail(){
  const input=normalizeText(document.getElementById('name').value);
  const result=document.getElementById('result');

  if(!input){
    result.innerHTML=`<div class="result-card"><div class="result-name">Sila masukkan nama murid</div></div>`;
    return;
  }

  const found=studentData.find(s=>normalizeText(s.name)===input);

  if(found){
    result.innerHTML=`
      <div class="result-card">
        <div class="result-name">${found.name}</div>
        <div class="result-email">${found.email}</div>
        <button class="copy-btn" onclick="copyEmail('${found.email}')">Salin Email</button>
      </div>
    `;
  }else{
    const partial=studentData.filter(s=>normalizeText(s.name).includes(input)).slice(0,10);

    if(partial.length>0){
      result.innerHTML=partial.map(s=>`
        <div class="match">
          <div class="result-name">${s.name}</div>
          <div class="result-email">${s.email}</div>
          <button class="copy-btn" onclick="copyEmail('${s.email}')">Salin Email</button>
        </div>
      `).join('');
    }else{
      result.innerHTML=`<div class="result-card"><div class="result-name">Nama tidak dijumpai</div></div>`;
    }
  }
}

document.getElementById('name').addEventListener('keydown',function(event){
  if(event.key==='Enter'){
    searchEmail();
  }
});
</script>

</body>
</html>
